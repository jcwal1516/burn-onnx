# Declarative expectations for the upstream ONNX backend node tests
# vendored under `vendor/node/`. The runner consults this file to decide
# whether each test is expected to pass, fail, or be skipped, and fails
# CI on any drift between this file and reality.
#
# Source:    onnx v1.19.0 node tests (https://github.com/onnx/onnx)
# Vendoring: bulk-copied via cargo xtask refresh-onnx-tests.
#
# Status values:
#   pass         - codegen succeeds, compile succeeds, output matches reference
#   skip-codegen - onnx2burn panics or refuses the model
#   skip-compile - codegen succeeds but generated Rust does not compile
#   fail-compare - compiles and runs but produces incorrect output
#   flaky        - intermittent, ignored by the gate
#
# Optional fields: reason, tracking (issue/PR ref), wontfix (bool)
#
# Initial classification sourced from:
#   - tracel-ai/burn-onnx#314 (skip-codegen list, ~656 entries)
#   - tracel-ai/burn-onnx#311 (fail-compare list, ~181 entries)
# Refresh with: cargo xtask refresh-onnx-tests --version <tag>

