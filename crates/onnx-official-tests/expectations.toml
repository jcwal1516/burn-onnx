# Declarative expectations for the upstream ONNX backend node tests
# vendored under `vendor/node/`. The runner consults this file to decide
# whether each test is expected to pass, fail, or be skipped, and fails
# CI on any drift between this file and reality.
#
# Source:    onnx v1.19.0 node tests (https://github.com/onnx/onnx)
# Vendoring: hand-copied; refresh by re-running the steps in
#            crates/onnx-official-tests/README.md.
#
# Status values:
#   pass         - codegen succeeds, compile succeeds, output matches reference
#   skip-codegen - onnx2burn panics or refuses the model (not yet wired)
#   skip-compile - codegen succeeds but generated Rust does not compile (not yet wired)
#   fail-compare - compiles and runs but produces incorrect output (not yet wired)
#   flaky        - intermittent, ignored by the gate (not yet wired)
#
# Optional fields: reason, tracking (issue/PR ref), wontfix (bool)

